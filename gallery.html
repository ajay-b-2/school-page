<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fb;
}

/* Back Button */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
}

.back-btn img{
    width:30px;
    padding:6px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.back-btn img{
    width:28px;
    padding:5px;
    border-radius:50%;
    background:#f0f0f0;
    transition:0.3s;
}

.back-btn img:hover{
    background:#162a47;
}
/* Title */
h1{
    text-align:center;
    padding:40px 20px 20px;
    color:#162a47;
}

/* Gallery Grid */
.gallery{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
}

/* Images */
.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
    transition:0.4s;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* Hover Effect */
.gallery img:hover{
    transform:scale(1.05);
}

/* Mobile */
@media(max-width:768px){
    .gallery img{
        height:180px;
    }
}
</style>

</head>
