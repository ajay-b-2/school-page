<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-box{
    background:white;
    padding:30px;
    width:350px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}
button{
    width:100%;
    padding:12px;
    border:none;
    background:#162a47;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
button:hover{
    background:#0d6efd;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Student Login</h2>
    <input type="email" placeholder="Enter your email">
    <input type="password" placeholder="Enter your password">
    <button onclick="loginStudent()">Login</button>
</div>

<script>
function loginStudent(){
    alert("Login Successful!");
}
</script>

</body>
</html>
